<div class="bg-white dark:bg-slate-900 min-h-screen">

    <header class="text-center mb-12">

    </header>

    <widget-playground-state-102020 state='{"playground":{"basic":{"preload":"metadata","poster":"","disabled":false,"loading":false},"autoplay":{"autoplay":true,"loop":true,"muted":true,"preload":"auto"},"loading":{"loading":true,"poster":"https://images.example.com/previews/report-thumb.jpg","preload":"metadata"},"disabled":{"disabled":true,"preload":"metadata"},"minimal":{"preload":"none"},"rich":{"poster":"https://images.example.com/previews/brochure-thumb.jpg","preload":"auto"}}}'>

          <groupplaymedia--ml-pdf-viewer
            preload="{{playground.basic.preload}}"
            poster="{{playground.basic.poster}}"
            disabled="{{playground.basic.disabled}}"
            loading="{{playground.basic.loading}}">
            <Label>Quarterly Report</Label>
            <Source src="https://cdn.example.com/docs/quarterly-report.pdf" type="application/pdf" />
          </groupplaymedia--ml-pdf-viewer>
        </demo>
        <details class="mt-4">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">Properties</summary>
          <div class="mt-2 p-4 border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-900">
            <widget-playground-state-text-102020 label="preload" value="{{playground.basic.preload}}"></widget-playground-state-text-102020>
            <widget-playground-state-text-102020 label="poster" value="{{playground.basic.poster}}"></widget-playground-state-text-102020>
            <widget-playground-state-boolean-102020 label="disabled" value="{{playground.basic.disabled}}"></widget-playground-state-boolean-102020>
            <widget-playground-state-boolean-102020 label="loading" value="{{playground.basic.loading}}"></widget-playground-state-boolean-102020>
          </div>
        </details>
        <details class="mt-2">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">HTML</summary>
          <div class="mt-2">
            <widget-playground-state-preview-code-102020 target="demo-basic">
              <template>
                <groupplaymedia--ml-pdf-viewer
                  preload="{{playground.basic.preload}}"
                  poster="{{playground.basic.poster}}"
                  disabled="{{playground.basic.disabled}}"
                  loading="{{playground.basic.loading}}">
                  <Label>Quarterly Report</Label>
                  <Source src="https://cdn.example.com/docs/quarterly-report.pdf" type="application/pdf" />
                </groupplaymedia--ml-pdf-viewer>
              </template>
            </widget-playground-state-preview-code-102020>
          </div>
        </details>
