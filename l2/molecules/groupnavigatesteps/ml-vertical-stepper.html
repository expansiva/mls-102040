            disabled="{{playground.basic.disabled}}"
            loading="{{playground.basic.loading}}">
            <Label>Checkout</Label>
            <Step title="Cart" completed></Step>

            <Step title="Payment"></Step>
            <Step title="Confirmation"></Step>

<groupnavigatesteps--ml-vertical-stepper

  linear="{{playground.basic.linear}}"
  disabled="{{playground.basic.disabled}}"
